name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions
      - name: Install bun2nix
        run: bun install --global bun2nix
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build
        env:
          VITE_GOOGLE_OAUTH_CLIENT_ID: "755761570634-k69o0r01al6q03dtpupg036g0oj7p3hc.apps.googleusercontent.com"
          VITE_PUBLIC_POSTHOG_KEY: "phc_zGnWGAL8Cax5Vlc5XvnGTtQL7NfXCetKpfWe74EHgjr"
          VITE_PUBLIC_POSTHOG_HOST: "https://eu.i.posthog.com"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
